name: release

# Tag a release (e.g. git tag v1.0.0 && git push --tags) to build and push the
# images to GHCR.
on:
  push:
    tags: ['v*']

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: web image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plex-collection-manager-web:latest
            ghcr.io/${{ github.repository_owner }}/plex-collection-manager-web:${{ github.ref_name }}

      - name: api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plex-collection-manager-api:latest
            ghcr.io/${{ github.repository_owner }}/plex-collection-manager-api:${{ github.ref_name }}
